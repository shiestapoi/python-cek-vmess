name: Build And Deploy VMess Report

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      check_connectivity:
        description: "Run connectivity checks with xray"
        required: true
        type: boolean
        default: true
      max_entries:
        description: "Max VMess entries to process (0 = all)"
        required: true
        type: string
        default: "0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y curl unzip

      - name: Install xray
        run: |
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip -d xray-bin
          chmod +x xray-bin/xray
          ./xray-bin/xray version

      - name: Prepare output directory
        run: mkdir -p site

      - name: Generate report
        env:
          MAX_ENTRIES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_entries || '0' }}
          CHECK_CONNECTIVITY: ${{ github.event_name != 'workflow_dispatch' || inputs.check_connectivity }}
        run: |
          ARGS="--no-progress"
          if [ "$CHECK_CONNECTIVITY" = "true" ]; then
            ARGS="$ARGS --check-connectivity --connect-timeout 10 --connect-workers 40"
          else
            ARGS="$ARGS --no-check-connectivity"
          fi
          if [ "$MAX_ENTRIES" != "0" ]; then
            ARGS="$ARGS --max-entries $MAX_ENTRIES"
          fi
          PATH="$PWD/xray-bin:$PATH" python proxy_checker.py --output site/index.html --json site/report.json $ARGS

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update repository description with Pages URL
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPO_DESC_TOKEN || github.token }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          REPO: ${{ github.repository }}
        run: |
          current_desc=$(gh api "repos/$REPO" --jq '.description // ""')
          clean_desc=$(python -c "import re,sys; s=sys.argv[1]; print(re.sub(r'\s*\|\s*Pages:\s*https?://\S+','',s).strip())" "$current_desc")
          if [ -n "$clean_desc" ]; then
            new_desc="$clean_desc | Pages: $PAGE_URL"
          else
            new_desc="Pages: $PAGE_URL"
          fi
          gh api -X PATCH "repos/$REPO" -f description="$new_desc"
          echo "Repository description updated: $new_desc"
