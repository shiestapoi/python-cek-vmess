name: Build And Deploy V2Ray Report

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Protocol mode to process"
        required: true
        type: choice
        options:
          - all
          - vmess
          - vless
        default: all

      vmess_url:
        description: |
          VMess config source URL (optional).
          Leave empty to use script default:
          https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/.../vmess_configs.txt
        required: false
        type: string
        default: ""

      vless_url:
        description: |
          VLess config source URL (optional).
          Leave empty to use script default:
          https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/.../vless_configs.txt
        required: false
        type: string
        default: ""

      geo_provider:
        description: "Geolocation provider strategy"
        required: true
        type: choice
        options:
          - auto
          - free
          - offline
          - apikey
          - ipinfo
          - abstract
        default: auto

      check_connectivity:
        description: "Run connectivity checks via xray"
        required: true
        type: boolean
        default: true

      ok_only:
        description: "HTML report shows only connectivity=ok entries"
        required: true
        type: boolean
        default: true

      max_entries:
        description: "Max entries to process per protocol (0 = all)"
        required: false
        type: string
        default: "0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y curl unzip

      - name: Install xray
        run: |
          curl -fsSL -o xray.zip \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip -d xray-bin
          chmod +x xray-bin/xray
          echo "xray version: $(./xray-bin/xray version | head -1)"

      # Cache GeoLite2 mmdb files — refreshed weekly
      - name: Set mmdb cache week key
        id: mmdb-week
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache GeoLite2 mmdb (weekly refresh)
        uses: actions/cache@v4
        id: mmdb-cache
        with:
          path: |
            geolite2-city-ipv4.mmdb
            geolite2-city-ipv6.mmdb
            geolite2-asn-ipv4.mmdb
            geolite2-asn-ipv6.mmdb
          key: geolite2-mmdb-${{ steps.mmdb-week.outputs.week }}
          restore-keys: geolite2-mmdb-

      - name: Download mmdb files (cache miss)
        if: steps.mmdb-cache.outputs.cache-hit != 'true'
        run: |
          BASE="https://raw.githubusercontent.com/sapics/ip-location-db/refs/heads/main"
          curl -fsSL -o geolite2-city-ipv4.mmdb "$BASE/geolite2-city-mmdb/geolite2-city-ipv4.mmdb"
          curl -fsSL -o geolite2-city-ipv6.mmdb "$BASE/geolite2-city-mmdb/geolite2-city-ipv6.mmdb"
          curl -fsSL -o geolite2-asn-ipv4.mmdb  "$BASE/geolite2-asn-mmdb/geolite2-asn-ipv4.mmdb"
          curl -fsSL -o geolite2-asn-ipv6.mmdb  "$BASE/geolite2-asn-mmdb/geolite2-asn-ipv6.mmdb"
          echo "Downloaded mmdb files:"
          ls -lh geolite2-*.mmdb 2>/dev/null || echo "(none found — will retry via script)"

      - name: Prepare output directory
        run: mkdir -p site

      - name: Generate report
        env:
          IPGEOLOCATION_API_KEYS: ${{ secrets.IPGEOLOCATION_API_KEYS }}
          IPINFO_TOKEN:           ${{ secrets.IPINFO_TOKEN }}
          ABSTRACTAPI_KEY:        ${{ secrets.ABSTRACTAPI_KEY }}
          # ── Runtime values (dispatch inputs or schedule defaults) ───────────
          MODE:         ${{ github.event_name == 'workflow_dispatch' && inputs.mode          || 'all'   }}
          GEO_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.geo_provider  || 'auto'  }}
          CHECK_CONN:   ${{ github.event_name != 'workflow_dispatch' || inputs.check_connectivity }}
          OK_ONLY:      ${{ github.event_name != 'workflow_dispatch' || inputs.ok_only }}
          MAX_ENTRIES:  ${{ github.event_name == 'workflow_dispatch' && inputs.max_entries   || '0'    }}
          VMESS_URL:    ${{ github.event_name == 'workflow_dispatch' && inputs.vmess_url     || ''     }}
          VLESS_URL:    ${{ github.event_name == 'workflow_dispatch' && inputs.vless_url     || ''     }}
        run: |
          # ── Write .env for secret injection ────────────────────────────────
          {
            [ -n "$IPGEOLOCATION_API_KEYS" ] && \
              echo "IPGEOLOCATION_API_KEYS=$IPGEOLOCATION_API_KEYS"
            [ -n "$IPINFO_TOKEN"   ] && echo "IPINFO_TOKEN=$IPINFO_TOKEN"
            [ -n "$ABSTRACTAPI_KEY"] && echo "ABSTRACTAPI_KEY=$ABSTRACTAPI_KEY"
          } > .env

          # ── Build argument list ─────────────────────────────────────────────
          ARGS="--no-progress"
          ARGS="$ARGS --mode $MODE"
          ARGS="$ARGS --geo-provider $GEO_PROVIDER"

          # ── Source URL inputs (empty = use script default) ──────────────────
          # The script's read_source() accepts http(s):// URLs directly as input.
          # When VMESS_URL / VLESS_URL are empty, no flag is passed and the
          # script falls back to its own hardcoded default URLs.
          if [ -n "$VMESS_URL" ]; then
            ARGS="$ARGS --vmess-input '$VMESS_URL'"
            echo "VMess source : $VMESS_URL"
          else
            echo "VMess source : (script default)"
          fi

          if [ -n "$VLESS_URL" ]; then
            ARGS="$ARGS --vless-input '$VLESS_URL'"
            echo "VLess source : $VLESS_URL"
          else
            echo "VLess source : (script default)"
          fi

          # ── Connectivity ────────────────────────────────────────────────────
          if [ "$CHECK_CONN" = "true" ]; then
            ARGS="$ARGS --check-connectivity"
            ARGS="$ARGS --connect-timeout 10"
            ARGS="$ARGS --tcp-timeout 3"
            ARGS="$ARGS --connect-workers 200"
            ARGS="$ARGS --xray-semaphore 40"
          else
            ARGS="$ARGS --no-check-connectivity"
          fi

          # ── HTML filter ─────────────────────────────────────────────────────
          if [ "$OK_ONLY" = "true" ]; then
            ARGS="$ARGS --ok-only"
          else
            ARGS="$ARGS --no-ok-only"
          fi

          # ── Entry limit ─────────────────────────────────────────────────────
          if [ "$MAX_ENTRIES" != "0" ] && [ -n "$MAX_ENTRIES" ]; then
            ARGS="$ARGS --max-entries $MAX_ENTRIES"
          fi

          # ── Run ────────────────────────────────────────────────────────────
          echo "Running: python v2ray_report.py $ARGS"
          PATH="$PWD/xray-bin:$PATH" eval python v2ray_report.py \
            --output site/index.html \
            --json   site/report.json \
            $ARGS

          # ── Cleanup .env so it's never uploaded ────────────────────────────
          rm -f .env

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update repository description with Pages URL
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPO_DESC_TOKEN || github.token }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          REPO: ${{ github.repository }}
        run: |
          current_desc=$(gh api "repos/$REPO" --jq '.description // ""')
          clean_desc=$(python -c "
          import re, sys
          s = sys.argv[1]
          print(re.sub(r'\s*\|\s*Pages:\s*https?://\S+', '', s).strip())
          " "$current_desc")
          if [ -n "$clean_desc" ]; then
            new_desc="$clean_desc | Pages: $PAGE_URL"
          else
            new_desc="Pages: $PAGE_URL"
          fi
          gh api -X PATCH "repos/$REPO" -f description="$new_desc"
          echo "Updated description: $new_desc"